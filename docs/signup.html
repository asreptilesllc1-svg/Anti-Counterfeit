<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Create your ProductAuth account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14171c; --panel: #1b1f26; --hairline: rgba(237,238,240,0.1); --hairline-strong: rgba(237,238,240,0.2);
    --text: #edeef0; --text-muted: #979da8; --text-faint: #575d68;
    --brass: #c9a227; --brass-bright: #e0bc4a; --brass-ink: #1a1508;
    --danger: #e0665c;
    --font-display: "Fraunces", serif; --font-body: "IBM Plex Sans", sans-serif; --font-mono: "IBM Plex Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse 1000px 500px at 50% -10%, rgba(201,162,39,0.08), transparent), var(--ink);
    color: var(--text); font-family: var(--font-body); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--brass-bright); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .panel {
    background: var(--panel); border: 1px solid var(--hairline); border-radius: 18px;
    padding: 44px 40px; max-width: 420px; width: 100%;
  }
  .brand {
    display: flex; align-items: center; gap: 10px; justify-content: center;
    font-family: var(--font-display); font-weight: 600; font-size: 19px; margin-bottom: 30px;
  }
  h1 { font-family: var(--font-display); font-weight: 600; font-size: 26px; text-align: center; margin-bottom: 8px; letter-spacing: -0.01em; }
  .sub { text-align: center; color: var(--text-muted); font-size: 14.5px; margin-bottom: 30px; }

  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 7px; font-weight: 500; }
  input {
    width: 100%; padding: 12px 14px; margin-bottom: 18px; border-radius: 10px;
    border: 1px solid var(--hairline-strong); background: rgba(255,255,255,0.03); color: var(--text);
    font-family: var(--font-body); font-size: 15px; transition: border-color 0.2s ease;
  }
  input:focus { outline: none; border-color: var(--brass); }
  input::placeholder { color: var(--text-faint); }

  button {
    width: 100%; padding: 13px; border-radius: 999px; border: none;
    background: var(--brass); color: var(--brass-ink); font-weight: 600; font-size: 15px;
    cursor: pointer; transition: background 0.2s ease, transform 0.2s ease; font-family: var(--font-body);
  }
  button:hover { background: var(--brass-bright); transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .msg { font-size: 13.5px; padding: 12px 14px; border-radius: 10px; margin-bottom: 18px; display: none; }
  .msg.error { background: rgba(224,102,92,0.12); border: 1px solid rgba(224,102,92,0.3); color: var(--danger); display: block; }
  .msg.success { background: rgba(63,167,160,0.12); border: 1px solid rgba(63,167,160,0.3); color: #58c7bf; display: block; }

  .key-box {
    font-family: var(--font-mono); font-size: 13px; background: rgba(0,0,0,0.4);
    border: 1px solid var(--hairline-strong); border-radius: 10px; padding: 14px; margin-bottom: 18px;
    word-break: break-all; color: var(--brass-bright);
  }
  .foot { text-align: center; margin-top: 22px; font-size: 14px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="panel">
  <a href="index.html" class="brand">
    <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="#c9a227" stroke-width="2"/>
      <path d="M12 20l6 6 10-11" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    ProductAuth
  </a>
  <h1>Create your account</h1>
  <p class="sub">Start protecting your products in minutes.</p>

  <div id="msg" class="msg"></div>
  <div id="keyBox" class="key-box" style="display:none;"></div>

  <form id="signupForm">
    <label for="businessName">Business name</label>
    <input type="text" id="businessName" placeholder="Your brand name" />

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@yourbrand.com" required />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" />

    <button type="submit" id="submitBtn">Create account</button>
  </form>

  <p class="foot">Already have an account? <a href="login.html">Log in</a></p>
  <p style="text-align:center; margin-top:14px; font-size:12px; color:var(--text-faint);">A <a href="https://builderdogs.com" target="_blank" rel="noopener" style="color:inherit;">Builder Dogs</a> Brand</p>
</div>

<script>
  const API_URL = 'https://anti-counterfeit-backend-new.onrender.com';
  const form = document.getElementById('signupForm');
  const msg = document.getElementById('msg');
  const keyBox = document.getElementById('keyBox');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg';
    msg.textContent = '';
    keyBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    try {
      const res = await fetch(`${API_URL}/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          businessName: document.getElementById('businessName').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Signup failed');

      msg.className = 'msg success';
      msg.textContent = 'Account created! Save your API key below — you\'ll need it to generate QR codes.';
      keyBox.style.display = 'block';
      keyBox.textContent = data.account.api_key;
      form.style.display = 'none';
    } catch (err) {
      msg.className = 'msg error';
      msg.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>

</body>
</html>
