<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Product Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #14171c;
    --panel: rgba(255,255,255,0.045);
    --hairline: rgba(237, 238, 240, 0.12);
    --text: #edeef0;
    --text-muted: #979da8;
    --accent: #c9a227;
    --accent-dim: rgba(201, 162, 39, 0.14);
    --font-display: "Fraunces", serif;
    --font-body: "IBM Plex Sans", -apple-system, sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(ellipse 900px 500px at 50% -10%, var(--accent-dim), transparent), var(--ink);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--hairline);
    border-radius: 20px;
    padding: 40px 34px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    opacity: 0;
    transform: translateY(12px);
    animation: cardIn 0.5s ease forwards;
    position: relative;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

  .brand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 26px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--hairline);
  }
  .brand-row img { width: 26px; height: 26px; border-radius: 6px; object-fit: cover; }
  .brand-name { font-family: var(--font-display); font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }

  .icon-stage { width: 92px; height: 92px; margin: 0 auto 20px; position: relative; }

  .spinner {
    width: 100%; height: 100%; border-radius: 50%;
    border: 3px solid rgba(201, 162, 39, 0.18);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pulse-ring { position: absolute; inset: 0; border-radius: 50%; opacity: 0; }
  .pulse-ring.active { animation: pulseRing 1.4s cubic-bezier(0.2, 0.7, 0.4, 1) 1; }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 currentColor; opacity: 0.5; }
    70%  { box-shadow: 0 0 0 30px transparent; opacity: 0; }
    100% { box-shadow: 0 0 0 30px transparent; opacity: 0; }
  }

  .result-icon {
    width: 100%; height: 100%; border-radius: 50%; display: none;
    align-items: center; justify-content: center; position: relative; z-index: 1;
  }
  .result-icon.show { display: flex; animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes popIn { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .result-icon.success { background: rgba(201, 162, 39, 0.12); border: 2px solid var(--accent); color: var(--accent); }
  .result-icon.warning { background: rgba(224, 179, 63, 0.12); border: 2px solid #e0b33f; color: #e0b33f; }
  .result-icon.error   { background: rgba(224, 102, 92, 0.12); border: 2px solid #e0665c; color: #e0665c; }
  .result-icon svg { width: 40px; height: 40px; overflow: visible; }

  .checkmark-path { transition: stroke-dashoffset 0.5s ease; }

  .result-icon.warning.show { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, wobble 0.6s 0.45s ease; }
  @keyframes wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }

  .card.shake { animation: cardIn 0.5s ease forwards, shake 0.5s 0.1s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); } 80% { transform: translateX(5px); }
  }

  .sparkle {
    position: absolute; top: 50%; left: 50%; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); pointer-events: none; opacity: 0;
  }
  .sparkle.burst { animation: sparkleFly 0.8s ease-out forwards; }
  @keyframes sparkleFly {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1) translate(0, 0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) translate(var(--dx), var(--dy)); }
  }

  .status {
    font-family: var(--font-display); font-size: 22px; font-weight: 600;
    margin-bottom: 6px; opacity: 0; letter-spacing: -0.01em;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .success-text { color: var(--accent); }
  .warning-text { color: #e0b33f; }
  .error-text { color: #e0665c; }

  .meta {
    text-align: left; margin-top: 22px; font-size: 14.5px; opacity: 0;
    animation: fadeUp 0.4s 0.35s ease forwards;
    background: rgba(255,255,255,0.03); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 16px 18px;
  }
  .meta-row { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; }
  .meta-row + .meta-row { border-top: 1px solid var(--hairline); }
  .meta-label { color: var(--text-muted); font-size: 13px; }
  .meta-value { font-family: var(--font-mono); font-size: 13px; text-align: right; }

  .chain-badge {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--hairline);
    font-size: 13px; text-align: left;
  }
  .chain-badge a { color: var(--accent); word-break: break-all; text-decoration: none; font-family: var(--font-mono); font-size: 12.5px; }
  .chain-badge a:hover { text-decoration: underline; }

  footer { margin-top: 26px; font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>

<body>
<div class="card" id="card">
  <div class="brand-row" id="brandRow" style="display:none;">
    <img id="brandLogo" style="display:none;" alt="" />
    <span class="brand-name" id="brandName"></span>
  </div>
  <div class="icon-stage" id="iconStage">
    <div class="spinner" id="spinner"></div>
    <div class="pulse-ring" id="pulseRing"></div>
    <div class="result-icon" id="resultIcon"></div>
  </div>
  <div id="status" class="status">Checking…</div>
  <div id="details"></div>
  <footer>Secured by ProductAuth</footer>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("p");

const cardEl = document.getElementById("card");
const spinnerEl = document.getElementById("spinner");
const pulseRingEl = document.getElementById("pulseRing");
const resultIconEl = document.getElementById("resultIcon");
const statusEl = document.getElementById("status");
const detailsEl = document.getElementById("details");
const brandRowEl = document.getElementById("brandRow");
const brandLogoEl = document.getElementById("brandLogo");
const brandNameEl = document.getElementById("brandName");

const ICONS = {
  success: `<svg viewBox="0 0 52 52"><path class="checkmark-path" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M14 27l8 8 16-16"/></svg>`,
  warning: `<svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.2" fill="currentColor"/><path d="M10.9 3.6a1.3 1.3 0 0 1 2.2 0l8.6 14.9a1.3 1.3 0 0 1-1.1 2H3.4a1.3 1.3 0 0 1-1.1-2z" stroke="currentColor" stroke-width="1.8"/></svg>`,
  error: `<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>`,
};

function applyBrand(brand) {
  if (!brand) return;
  if (brand.color) document.documentElement.style.setProperty('--accent', brand.color);
  if (brand.businessName) {
    brandNameEl.textContent = brand.businessName;
    brandRowEl.style.display = 'flex';
  }
  if (brand.logoUrl) {
    brandLogoEl.src = brand.logoUrl;
    brandLogoEl.style.display = 'block';
  }
}

function showResult(type, text) {
  spinnerEl.style.display = "none";
  resultIconEl.className = `result-icon ${type}`;
  resultIconEl.innerHTML = ICONS[type];

  if (type === "success") {
    const path = resultIconEl.querySelector(".checkmark-path");
    if (path) {
      const len = path.getTotalLength();
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
    }
  }

  resultIconEl.offsetHeight;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      resultIconEl.classList.add("show");
      pulseRingEl.className = "pulse-ring active";
      pulseRingEl.style.color = type === "success" ? "var(--accent)" : type === "warning" ? "#e0b33f" : "#e0665c";
      if (type === "success") {
        const path = resultIconEl.querySelector(".checkmark-path");
        if (path) path.style.strokeDashoffset = "0";
      }
    });
  });

  statusEl.textContent = text;
  statusEl.className = `status ${type}-text`;
  statusEl.style.animation = "none";
  statusEl.offsetHeight;
  statusEl.style.animation = "fadeUp 0.4s 0.2s ease forwards";

  if (type === "success") setTimeout(launchSparkles, 80);
  if (type === "error") cardEl.classList.add("shake");
}

function launchSparkles() {
  const stage = document.getElementById('iconStage');
  const count = 10;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (Math.PI * 2 * i) / count;
    const distance = 55 + Math.random() * 18;
    s.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
    s.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
    stage.appendChild(s);
    requestAnimationFrame(() => s.classList.add('burst'));
    setTimeout(() => s.remove(), 900);
  }
}

function showDetails(data) {
  const p = data.payload;
  let rows = `
    <div class="meta-row"><span class="meta-label">Product</span><span class="meta-value">${p.name || '—'}</span></div>
    <div class="meta-row"><span class="meta-label">ID</span><span class="meta-value">${p.id || '—'}</span></div>
    <div class="meta-row"><span class="meta-label">Batch</span><span class="meta-value">${p.batch || '—'}</span></div>
    <div class="meta-row"><span class="meta-label">Scans</span><span class="meta-value">${data.scanCount}</span></div>
  `;
  if (data.location) {
    rows += `<div class="meta-row"><span class="meta-label">Last scan location</span><span class="meta-value">${data.location}</span></div>`;
  }
  let chain = '';
  if (data.inscriptionId) {
    chain = `<div class="chain-badge"><strong style="color:var(--accent)">⛓ Inscribed on Dogecoin</strong><br><a href="https://wonky-ord.dogeord.io/inscription/${encodeURIComponent(data.inscriptionId)}" target="_blank" rel="noopener">View permanent on-chain record</a></div>`;
  }
  detailsEl.innerHTML = `<div class="meta">${rows}${chain}</div>`;
}

if (!token) {
  showResult("error", "No Token Provided");
} else {
  fetch("https://anti-counterfeit-backend-new.onrender.com/verify-token", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ signedToken: token })
  })
  .then(res => res.json())
  .then(data => {
    applyBrand(data.brand);

    if (!data.valid) {
      showResult("error", data.error === "This product has been deactivated" ? "Product Deactivated" : "Verification Failed");
      return;
    }

    showResult(data.cloneRisk ? "warning" : "success", data.cloneRisk ? "Possible Duplicate" : "Authentic Product");
    showDetails(data);
  })
  .catch(() => {
    showResult("error", "Server Error");
  });
}
</script>
</body>
</html>
