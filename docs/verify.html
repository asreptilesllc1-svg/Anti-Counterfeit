<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Product Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(circle at top, #0f2027, #000);
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  .card {
    background: rgba(0,0,0,0.6);
    border-radius: 20px;
    padding: 36px 30px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,255,0.15);
    opacity: 0;
    transform: translateY(12px);
    animation: cardIn 0.5s ease forwards;
    position: relative;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Icon stage ===== */
  .icon-stage {
    width: 96px;
    height: 96px;
    margin: 0 auto 18px;
    position: relative;
  }

  /* Spinner (checking state) */
  .spinner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid rgba(0, 245, 255, 0.15);
    border-top-color: #00f5ff;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pulse ring behind the result icon */
  .pulse-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
  }
  .pulse-ring.active {
    animation: pulseRing 1.4s cubic-bezier(0.2, 0.7, 0.4, 1) 1;
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 currentColor; opacity: 0.55; }
    70%  { box-shadow: 0 0 0 32px transparent; opacity: 0; }
    100% { box-shadow: 0 0 0 32px transparent; opacity: 0; }
  }

  /* Result icon circle */
  .result-icon {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .result-icon.show { display: flex; animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes popIn {
    0% { transform: scale(0.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-icon.success { background: rgba(0, 255, 204, 0.12); border: 2px solid #00ffcc; color: #00ffcc; }
  .result-icon.warning { background: rgba(255, 204, 0, 0.12); border: 2px solid #ffcc00; color: #ffcc00; }
  .result-icon.error   { background: rgba(255, 77, 77, 0.12); border: 2px solid #ff4d4d; color: #ff4d4d; }

  .result-icon svg { width: 44px; height: 44px; overflow: visible; }

  /* Checkmark draw-in — dasharray/dashoffset set dynamically in JS to match the real path length */
  .checkmark-path {
    transition: stroke-dashoffset 0.5s ease;
  }

  /* Warning icon wobble */
  .result-icon.warning.show { animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, wobble 0.6s 0.45s ease; }
  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  /* Error shake — applied to the whole card */
  .card.shake { animation: cardIn 0.5s ease forwards, shake 0.5s 0.1s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* Sparkle burst for authentic verification */
  .sparkle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #00ffcc;
    pointer-events: none;
    opacity: 0;
  }
  .sparkle.burst {
    animation: sparkleFly 0.8s ease-out forwards;
  }
  @keyframes sparkleFly {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1) translate(0, 0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.3) translate(var(--dx), var(--dy)); }
  }

  .status {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    opacity: 0;
    animation: fadeUp 0.4s 0.2s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .success-text { color: #00ffcc; }
  .warning-text { color: #ffcc00; }
  .error-text { color: #ff4d4d; }

  .meta {
    text-align: left;
    margin-top: 20px;
    font-size: 15px;
    opacity: 0;
    animation: fadeUp 0.4s 0.35s ease forwards;
  }
  .meta div {
    margin-bottom: 8px;
  }
</style>
</head>

<body>
<div class="card" id="card">
  <div class="icon-stage" id="iconStage">
    <div class="spinner" id="spinner"></div>
    <div class="pulse-ring" id="pulseRing"></div>
    <div class="result-icon" id="resultIcon"></div>
  </div>
  <div id="status" class="status" style="animation:none; opacity:0;">Checking…</div>
  <div id="details"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("p");

const cardEl = document.getElementById("card");
const spinnerEl = document.getElementById("spinner");
const pulseRingEl = document.getElementById("pulseRing");
const resultIconEl = document.getElementById("resultIcon");
const statusEl = document.getElementById("status");
const detailsEl = document.getElementById("details");

const ICONS = {
  success: `<svg viewBox="0 0 52 52"><path class="checkmark-path" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M14 27l8 8 16-16"/></svg>`,
  warning: `<svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.2" fill="currentColor"/><path d="M10.9 3.6a1.3 1.3 0 0 1 2.2 0l8.6 14.9a1.3 1.3 0 0 1-1.1 2H3.4a1.3 1.3 0 0 1-1.1-2z" stroke="currentColor" stroke-width="1.8"/></svg>`,
  error: `<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>`,
};

function showResult(type, text) {
  spinnerEl.style.display = "none";

  // Set up the icon WITHOUT the animating classes yet, so the browser
  // registers this as the "before" state.
  resultIconEl.className = `result-icon ${type}`;
  resultIconEl.innerHTML = ICONS[type];

  if (type === "success") {
    const path = resultIconEl.querySelector(".checkmark-path");
    if (path) {
      const len = path.getTotalLength();
      path.style.strokeDasharray = len;
      path.style.strokeDashoffset = len;
    }
  }

  // Force the browser to paint the "before" state, THEN add the
  // animating classes on the next frame so the animation actually plays
  // from its starting keyframe instead of skipping straight to the end.
  resultIconEl.offsetHeight; // force reflow
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      resultIconEl.classList.add("show");
      pulseRingEl.className = "pulse-ring active";
      pulseRingEl.style.color = type === "success" ? "#00ffcc" : type === "warning" ? "#ffcc00" : "#ff4d4d";

      if (type === "success") {
        const path = resultIconEl.querySelector(".checkmark-path");
        if (path) path.style.strokeDashoffset = "0";
      }
    });
  });

  statusEl.textContent = text;
  statusEl.className = `status ${type}-text`;
  statusEl.style.animation = "none";
  statusEl.offsetHeight;
  statusEl.style.animation = "fadeUp 0.4s 0.2s ease forwards";

  if (type === "success") {
    setTimeout(launchSparkles, 80);
  }
  if (type === "error") {
    cardEl.classList.add("shake");
  }
}

function launchSparkles() {
  const stage = document.getElementById("iconStage");
  const count = 10;
  for (let i = 0; i < count; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    const angle = (Math.PI * 2 * i) / count;
    const distance = 60 + Math.random() * 20;
    s.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
    s.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
    stage.appendChild(s);
    requestAnimationFrame(() => s.classList.add("burst"));
    setTimeout(() => s.remove(), 900);
  }
}

function showDetails(html) {
  detailsEl.innerHTML = `<div class="meta">${html}</div>`;
}

if (!token) {
  showResult("error", "No Token Provided");
} else {
  fetch("https://anti-counterfeit-backend-new.onrender.com/verify-token", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ signedToken: token })
  })
  .then(res => res.json())
  .then(data => {
    if (!data.valid) {
      showResult("error", "Verification Failed");
      return;
    }

    if (data.cloneRisk) {
      showResult("warning", "Possible Duplicate");
    } else {
      showResult("success", "Authentic Product");
    }

    showDetails(`
      <div><strong>ID:</strong> ${data.payload.id}</div>
      <div><strong>Name:</strong> ${data.payload.name}</div>
      <div><strong>Batch:</strong> ${data.payload.batch}</div>
      <div><strong>Scans:</strong> ${data.scanCount}</div>
      ${data.inscriptionId ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.15);"><strong>⛓️ Inscribed on Dogecoin</strong><br><a href="https://wonky-ord.dogeord.io/inscription/${encodeURIComponent(data.inscriptionId)}" target="_blank" rel="noopener" style="color:#00ffcc;word-break:break-all;font-size:13px;">View permanent on-chain record</a></div>` : ""}
    `);
  })
  .catch(() => {
    showResult("error", "Server Error");
  });
}
</script>
</body>
</html>
